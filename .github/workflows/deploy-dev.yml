name: Deploy Dev

on:
  workflow_call:

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: envoy-project-management-dev
  ECS_CLUSTER: envoy-dev
  ECS_SERVICE: envoy-project-management-dev
  TASK_DEFINITION_FAMILY: envoy-project-management-dev
  CONTAINER_NAME: envoy-project-management-dev
  PRIVATE_SUBNETS: subnet-0db70c6bb64e54616,subnet-0ca7744767a351c8e

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEV_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.event.pull_request.head.sha }}
        run: |
          docker build \
            --build-arg GIT_SHA=$IMAGE_TAG \
            --build-arg BUILD_TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ") \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:dev-latest \
            .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:dev-latest

      - name: Register new task definition
        id: register-td
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.event.pull_request.head.sha }}
        run: |
          aws ecs describe-task-definition --task-definition "$TASK_DEFINITION_FAMILY" > td.json
          jq --arg IMG "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" --arg NAME "$CONTAINER_NAME" \
            '.taskDefinition | {family:.family, taskRoleArn:.taskRoleArn, executionRoleArn:.executionRoleArn, networkMode:.networkMode, containerDefinitions:(.containerDefinitions | map(if .name==$NAME then .image=$IMG else . end)), requiresCompatibilities:.requiresCompatibilities, cpu:.cpu, memory:.memory, volumes:.volumes}' td.json > register.json
          aws ecs register-task-definition --cli-input-json file://register.json > registered.json
          echo "task_definition=$(jq -r .taskDefinition.taskDefinitionArn registered.json)" >> "$GITHUB_OUTPUT"

      - name: Get ECS service security group
        id: service-network
        run: |
          SECURITY_GROUP=$(aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE" \
            --query 'services[0].networkConfiguration.awsvpcConfiguration.securityGroups[0]' \
            --output text)
          echo "security_group=$SECURITY_GROUP" >> "$GITHUB_OUTPUT"

      - name: Run database migrations
        env:
          TASK_DEFINITION: ${{ steps.register-td.outputs.task_definition }}
          SECURITY_GROUP: ${{ steps.service-network.outputs.security_group }}
        run: |
          TASK_ARN=$(aws ecs run-task \
            --cluster "$ECS_CLUSTER" \
            --task-definition "$TASK_DEFINITION" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[$PRIVATE_SUBNETS],securityGroups=[$SECURITY_GROUP],assignPublicIp=DISABLED}" \
            --overrides "{\"containerOverrides\": [{\"name\": \"$CONTAINER_NAME\", \"command\": [\"node\", \"ace\", \"migration:run\", \"--force\"]}]}" \
            --started-by "github-actions-dev-migrate" \
            --query 'tasks[0].taskArn' \
            --output text)

          aws ecs wait tasks-stopped --cluster "$ECS_CLUSTER" --tasks "$TASK_ARN"

          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster "$ECS_CLUSTER" \
            --tasks "$TASK_ARN" \
            --query 'tasks[0].containers[0].exitCode' \
            --output text)

          if [ "$EXIT_CODE" != "0" ]; then
            echo "Migration task failed with exit code $EXIT_CODE"
            exit 1
          fi

      - name: Update ECS service
        run: |
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE" \
            --task-definition "${{ steps.register-td.outputs.task_definition }}" \
            --desired-count 1 \
            --force-new-deployment
