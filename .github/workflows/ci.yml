name: CI

on:
  pull_request:
    branches: ['**']
  push:
    branches: ['**']

jobs:
  test:
    runs-on: ubuntu-latest

    # We need a postgres service to run the japa tests
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: envoy_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm i

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Run Tests
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: postgres
          DB_PASSWORD: password
          DB_DATABASE: envoy_test
          NODE_ENV: test
          APP_KEY: dummy_key_for_testing
          HOST: localhost
          PORT: 3333
          LOG_LEVEL: info
          SESSION_DRIVER: cookie
          REASONING_ENGINE_URL_DEV: http://localhost:8000
          REASONING_ENGINE_URL_PROD: http://localhost:8000
        run: |
          node ace migration:run
          npm run test:api

  cdk-diff:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Install CDK deps
        working-directory: infrastructure
        run: npm ci

      - name: CDK Diff
        working-directory: infrastructure
        run: npm run diff
