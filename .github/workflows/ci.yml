name: CI

on:
  pull_request:
    branches: ['**']

jobs:
  test:
    runs-on: ubuntu-latest

    # We need a postgres service to run the japa tests
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: envoy_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Run Tests
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: postgres
          DB_PASSWORD: password
          DB_DATABASE: envoy_test
          NODE_ENV: development
          APP_KEY: dummy_key_for_testing
          HOST: localhost
          PORT: 8080
          APP_URL: http://localhost:8080
          APP_ENV: test
          LOG_LEVEL: info
          SESSION_DRIVER: cookie
          REASONING_ENGINE_URL: http://localhost:8000
        run: |
          npm run test:api
          node ace migration:fresh --seed
          npm run test:ui

  deploy-dev:
    needs: test
    if: >
      !github.event.pull_request.draft &&
      (github.event.action == 'opened' || github.event.action == 'synchronize' || github.event.action == 'ready_for_review') &&
      github.event.pull_request.head.repo.full_name == github.repository
    uses: ./.github/workflows/deploy-dev.yml
    permissions:
      id-token: write
      contents: read
    secrets: inherit
