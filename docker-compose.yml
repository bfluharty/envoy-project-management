services:
  project-management:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: envoy-project-management:latest
    environment:
      - DB_HOST=postgres
      - HOST=0.0.0.0
      - CHOKIDAR_USEPOLLING=true
    ports:
      - '8080:8080'
    env_file:
      - .env
    volumes:
      - .:/app
      - project_management_node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy

  email-service:
    build:
      context: ../envoy-email-service
      dockerfile: Dockerfile.dev
    image: envoy-email-service:latest
    ports:
      - '8083:8083'
    env_file:
      - ../envoy-email-service/.env
      
  reasoning-engine:
    build:
      context: ../reasoning-engine
      dockerfile: Dockerfile.dev
    image: reasoning-engine:latest
    environment:
      - CHOKIDAR_USEPOLLING=true
    ports:
      - '8081:8081'
    env_file:
      - ../reasoning-engine/.env
    volumes:
      - ../reasoning-engine:/app
      - reasoning_engine_node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_DATABASE}
    ports:
      - '5432:5432'
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER}']
      interval: 2s
      timeout: 3s
      retries: 30

volumes:
  postgres_data:
  project_management_node_modules:
  reasoning_engine_node_modules:
