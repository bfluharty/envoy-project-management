services:
  project-management:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: envoy-project-management:latest
    environment:
      - DB_HOST=postgres
      - HOST=0.0.0.0
      - REASONING_ENGINE_URL_LOCAL=http://reasoning-engine:8081/reasoning/chat
      - CHOKIDAR_USEPOLLING=true
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - postgres

  reasoning-engine:
    build:
      context: ../reasoning-engine
    image: reasoning-engine:latest
    environment:
      - DB_HOST=postgres
    ports:
      - "8081:8081"
    env_file:
      - ../reasoning-engine/.env
    depends_on:
      - postgres
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_DATABASE}
    ports:
      - "5432:5432"
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: