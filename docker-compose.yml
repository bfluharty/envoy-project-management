services:
  app:
    build: .
    image: envoy-project-management:latest
    environment:
      - NODE_ENV=dev
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=
      - DB_DATABASE=envoy_project_dev
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    restart: unless-stopped

  reasoning-engine:
    build:
      context: ../reasoning-engine
    image: reasoning-engine:latest
    environment:
      - NODE_ENV=dev
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=
      - DB_DATABASE=envoy_project_dev
      - OPENAI_API_KEY=
    ports:
      - "8081:8081"
    depends_on:
      - postgres
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=envoy_project_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: